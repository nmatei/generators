<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="300" height="300" fill="#f5f5f5" rx="8"/>
  <defs>
    <clipPath id="half-credinta">
      <rect x="0" y="0" width="150" height="300"/>
    </clipPath>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Circles z=1..8 (each covers previous), credința first (lowest) -->
  <circle cx="150" cy="40"  r="40" fill="#4CAF50" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="228" cy="72"  r="40" fill="#00BCD4" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="260" cy="150" r="40" fill="#FFC107" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="228" cy="228" r="40" fill="#FF8A65" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="150" cy="260" r="40" fill="#EC407A" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="72"  cy="228" r="40" fill="#FFEB3B" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="40"  cy="150" r="40" fill="#EF5350" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <circle cx="72"  cy="72"  r="40" fill="#5C6BC0" stroke="white" stroke-width="3" filter="url(#shadow)"/>
  <!-- Left-half of credința on top — closes the chain loop over iubirea -->
  <circle cx="150" cy="40" r="40" fill="#4CAF50" stroke="white" stroke-width="3" clip-path="url(#half-credinta)"/>

  <!-- Labels -->
  <text x="150" y="40"  text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="10">credința</text>
  <text x="228" y="72"  text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="10">fapta</text>
  <text x="260" y="150" text-anchor="middle" dominant-baseline="middle" fill="#333"  font-family="Georgia,serif" font-weight="bold" font-size="10">cunoștința</text>
  <text x="228" y="228" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="10">înfrânarea</text>
  <text x="150" y="260" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="10">răbdarea</text>
  <text x="72"  cy="228" text-anchor="middle" dominant-baseline="middle" fill="#333"  font-family="Georgia,serif" font-weight="bold" font-size="10" y="228">evlavia</text>
  <text x="40"  y="150" text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="9">
    <tspan x="40" dy="-5">dragostea</tspan>
    <tspan x="40" dy="13">de frați</tspan>
  </text>
  <text x="72"  y="72"  text-anchor="middle" dominant-baseline="middle" fill="white" font-family="Georgia,serif" font-weight="bold" font-size="9">
    <tspan x="72" dy="-5">iubirea</tspan>
    <tspan x="72" dy="13">de oameni</tspan>
  </text>
</svg>
